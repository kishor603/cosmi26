<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Student Risk Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: #4e73df;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%), 
                radial-gradient(at 0% 100%, hsla(339,49%,30%,1) 0, transparent 50%), 
                radial-gradient(at 50% 100%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(253,16%,7%,1) 0, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            animation: fadeIn 0.6s ease-out;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-logo h1 {
            color: var(--primary-color);
            font-size: 28px;
            margin: 0;
            font-weight: 700;
        }
        .auth-logo span {
            font-weight: 300;
            color: var(--text-main);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header h2 {
            font-size: 18px;
            color: #495057;
            margin-bottom: 8px;
        }
        .auth-header p {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 700;
            color: #495057;
        }
        .form-group input {
            width: 100%;
            height: 45px;
            border-radius: 6px;
            border: 1px solid #ddd;
            padding: 10px 15px;
            font-size: 14px;
            transition: all 0.2s;
        }
        .form-group input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(63, 106, 216, 0.1);
        }
        .auth-btn {
            width: 100%;
            height: 48px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .auth-btn:hover {
            background: var(--primary-hover);
        }
        .auth-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>Architect <span>UI</span></h1>
            </div>
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Login to access the risk dashboard</p>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <div id="login-error" style="display:none; background:#fff0f0; color:#dc3545; border:1px solid #f5c6cb; border-radius:6px; padding:10px 14px; font-size:13px; margin-bottom:12px;">
                    ✗ Invalid username or password. Please try again.
                </div>
                <button type="submit" class="auth-btn">Login to Dashboard</button>
            </form>

            <!-- Quick-access credential cards -->
            <div style="margin-top: 24px; border-top: 1px solid #eee; padding-top: 20px;">
                <p style="font-size:11px; text-transform:uppercase; font-weight:700; color:#adb5bd; text-align:center; margin:0 0 12px;">Quick Login</p>
                <div style="display:flex; gap:10px;">
                    <!-- Admin card -->
                    <div onclick="fillLogin('admin','admin123')" style="flex:1; cursor:pointer; border:1.5px solid #e0e7ff; border-radius:8px; padding:12px 14px; transition:all 0.2s; background:#fff;" onmouseover="this.style.borderColor='#3f6ad8'; this.style.background='#f0f4ff'" onmouseout="this.style.borderColor='#e0e7ff'; this.style.background='#fff'">
                        <div style="font-size:10px; font-weight:700; text-transform:uppercase; color:#3f6ad8; margin-bottom:5px;">👤 Admin</div>
                        <div style="font-size:12px; color:#333;"><strong>admin</strong></div>
                        <div style="font-size:11px; color:#888;">admin123</div>
                    </div>
                    <!-- Superuser card -->
                    <div onclick="fillLogin('superuser','super@2024')" style="flex:1; cursor:pointer; border:1.5px solid #fef3c7; border-radius:8px; padding:12px 14px; transition:all 0.2s; background:#fff;" onmouseover="this.style.borderColor='#f59e0b'; this.style.background='#fffbeb'" onmouseout="this.style.borderColor='#fef3c7'; this.style.background='#fff'">
                        <div style="font-size:10px; font-weight:700; text-transform:uppercase; color:#f59e0b; margin-bottom:5px;">🛡️ Superuser</div>
                        <div style="font-size:12px; color:#333;"><strong>superuser</strong></div>
                        <div style="font-size:11px; color:#888;">super@2024</div>
                    </div>
                </div>
            </div>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Create Account</a>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
    <script>
        function fillLogin(user, pass) {
            document.getElementById('username').value = user;
            document.getElementById('password').value = pass;
            document.getElementById('login-error').style.display = 'none';
        }

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errBox = document.getElementById('login-error');

            if (Auth.login(user, pass)) {
                window.location.href = 'index.html';
            } else {
                errBox.style.display = 'block';
                document.getElementById('password').value = '';
            }
        });
    </script>
</body>
</html>
